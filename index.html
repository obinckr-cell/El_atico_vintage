<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1">
    <title>ÁTICO RESTAURANTE VINTAGE</title>
    <style>
        * { margin:0; padding:0; box-sizing:border-box; font-family:Arial,sans-serif; }
        body { background:#0f0f0f; color:#fff; overflow-x:hidden; padding-bottom:140px; }
        header { background:linear-gradient(180deg,#000,#0f0f0f); text-align:center; padding:22px 10px 12px; border-bottom:1px solid rgba(255,255,255,.08); }
        .logo-box { width:150px; height:150px; margin:auto; border-radius:28px; background:#1a1a1a; display:flex; align-items:center; justify-content:center; box-shadow:0 10px 25px rgba(0,0,0,.6); }
        .logo { width:110px; height:110px; object-fit:contain; }
        header h1 { font-size:34px; letter-spacing:6px; margin-top:10px; color:#f5d08a; font-weight:900; }
        
        .tabs { display:flex; justify-content:center; gap:10px; padding:20px; background:#000; }
        .tab-btn { padding:15px 25px; border:2px solid #f5d08a; background:transparent; color:#f5d08a; border-radius:12px; font-weight:bold; font-size:18px; cursor:pointer; transition:0.3s; }
        .tab-btn.active { background:#f5d08a; color:#000; }

        .categoria { font-size:44px; font-weight:900; color:#f5d08a; text-align:center; margin:35px 0 10px; letter-spacing:3px; }
        .categoria::before, .categoria::after { content:""; display:block; width:70%; height:2px; margin:0 auto 12px; background:linear-gradient(90deg,transparent,#f5d08a,transparent); }
        .container { display:grid; grid-template-columns:repeat(2,1fr); gap:12px; padding:10px; }
        .card { background:#1b1b1b; border-radius:14px; overflow:hidden; aspect-ratio:1/1; display:flex; flex-direction:column; }
        .card img { width:100%; height:55%; object-fit:cover; }
        .card-content { flex:1; padding:10px; display:flex; flex-direction:column; justify-content:space-between; }
        .card h3 { font-size:20px; font-weight:700; }
        .precio { font-size:16px; color:#ffb347; font-weight:bold; }
        .btn { width:100%; padding:16px; border:none; border-radius:12px; background:linear-gradient(#fff,#d4b483); font-weight:bold; font-size:17px; }
        
        @keyframes pulse { 0% { transform: scale(1); } 50% { transform: scale(1.15); } 100% { transform: scale(1); } }
        .cart-anim { animation: pulse 0.3s ease; }

        .cart-btn { position:fixed; bottom:210px; right:18px; width:130px; height:130px; border-radius:50%; background:#ff9800; border:none; font-size:52px; color:#fff; z-index:999; }
        .whatsapp-btn { position:fixed; bottom:60px; right:18px; width:130px; height:130px; border-radius:50%; background:#25D366; display:flex; align-items:center; justify-content:center; font-size:56px; text-decoration:none; color:#fff; z-index:999; }
        #cart { position:fixed; top:0; left:-100%; width:85%; height:100%; background:#181818; display:flex; flex-direction:column; transition:.35s ease; z-index:1000; border-top-right-radius:18px; border-bottom-right-radius:18px; overflow:hidden; }
        #cart.active { left:0; }
        .cart-header { padding:18px; display:flex; justify-content:space-between; align-items:center; background:#000; font-size:26px; border-bottom:1px solid rgba(255,255,255,.1); }
        .cart-header button { background:red; border:none; color:#fff; padding:14px 18px; border-radius:10px; font-size:22px; font-weight:bold; }
        #items { flex:1; overflow:auto; padding:12px; }
        .item { display:flex; gap:14px; align-items:center; background:#2a2a2a; padding:16px; border-radius:14px; margin-bottom:12px; }
        .item img { width:85px; height:85px; border-radius:14px; object-fit:cover; }
        .total-fuera { position:fixed; bottom:0; left:0; width:100%; background:#000; padding:18px; display:flex; justify-content:space-between; font-size:24px; font-weight:bold; border-top:2px solid rgba(255,255,255,.15); z-index:999; }
        .total-fuera span:first-child { color:#f5d08a; }
    </style>
</head>
<body>

<header>
    <div class="logo-box">
        <img src="logo.png" class="logo">
    </div>
    <h1>ÁTICO</h1>
</header>

<div class="tabs">
    <button id="btnAtico" class="tab-btn active" onclick="setMode('ÁTICO')">ÁTICO</button>
    <button id="btnLlevar" class="tab-btn" onclick="setMode('PARA LLEVAR')">PARA LLEVAR</button>
</div>

<div id="menu"></div>

<button class="cart-btn" id="cartBtn" onclick="toggleCart()">🛒 <span id="count">0</span></button>
<a class="whatsapp-btn" onclick="enviarPedido()">📲</a>

<div id="cart">
    <div class="cart-header">
        <h2>Carrito</h2>
        <button onclick="vaciarCarrito()" style="background:#ff4444; font-size:16px; margin-right:10px;">Borrar</button>
        <button onclick="toggleCart()">✖</button>
    </div>
    <div id="items"></div>
</div>

<div class="total-fuera">
    <span>Total</span>
    <span>$<span id="totalGeneral">0</span></span>
</div>

<script>
const numeroWhatsApp = "573106505193";
let modoPedido = "ÁTICO"; 

// --- LISTA PRECIOS ÁTICO ---
const comidasAtico = [
    {nombre:"INGLESA",precio:21000,img:"inglesa.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"BROOKLYN",precio:20000,img:"brooklyn.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"YORK",precio:20000,img:"york.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"ALOHA",precio:22000,img:"aloha.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"MANCHESTER",precio:27000,img:"manchester.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"BRUNCH MIX",precio:27000,img:"brunch_mix.jpg",categoria:"BRUNCH"},
    {nombre:"BRUNCH",precio:20000,img:"brunch.jpg",categoria:"BRUNCH"},
    {nombre:"BRUNCH DE POLLO",precio:20000,img:"brunch_pollo.jpg",categoria:"BRUNCH"},
    {nombre:"TACOS DON JULIO",precio:21000,img:"tacos.jpg",categoria:"COMIDA MEXICANA"},
    {nombre:"QUESADILLAS MONTERREY",precio:21000,img:"quesadillas.jpg",categoria:"COMIDA MEXICANA"},
    {nombre:"PAPAS COLOMBIANAS",precio:22000,img:"colombianas.jpg",categoria:"PAPAS"},
    {nombre:"ADICION DE TOCINETA",precio:2000,img:"tocineta.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN DE PAPAS",precio:4000,img:"papas.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN DE CARNE",precio:5000,img:"carne.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN SALSA",precio:1000,img:"salsa.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN QUESO",precio:1000,img:"queso.jpg",categoria:"ADICIONES"},
    {nombre:"MANGO BICHE",precio:7000,img:"mango.jpg",categoria:"SODA"},
    {nombre:"FRESA",precio:7000,img:"sfresa.jpg",categoria:"SODA"},
    {nombre:"MORA AZUL",precio:7000,img:"smora_azul.jpg",categoria:"SODA"},
    {nombre:"SANDÍA",precio:7000,img:"ssandia.jpg",categoria:"SODA"},
    {nombre:"MANDARINA",precio:7000,img:"smandarina.jpg",categoria:"SODA"},
    {nombre:"MANZANA VERDE",precio:7000,img:"smanzanaV.jpg",categoria:"SODA"},
    {nombre:"MICHELADA DE SODA",precio:7000,img:"misoda.jpg",categoria:"SODA"},
    {nombre:"MARACUYÁ",precio:7000,img:"smaracuya.jpg",categoria:"SODA"},
    {nombre:"TAMARINDO",precio:7000,img:"stamarindo.jpg",categoria:"SODA"},
    {nombre:"COCA COLA",precio:6000,img:"coca.jpg",categoria:"BEBIDAS"},
    {nombre:"CORONITA",precio:5000,img:"coronita.jpg",categoria:"BEBIDAS"},
    {nombre:"AGUA",precio:3000,img:"agua.jpg",categoria:"BEBIDAS"},
    {nombre:"TINTO",precio:1500,img:"tinto.jpg",categoria:"BEBIDAS"},
    {nombre:"AROMÁTICA",precio:1500,img:"aromatica.jpg",categoria:"BEBIDAS"},
    {nombre:"VINO",precio:6000,img:"vino.jpg",categoria:"BEBIDAS"}
];

// --- LISTA PRECIOS LLEVAR (EDITA LOS PRECIOS AQUÍ) ---
const comidasLlevar = [
    {nombre:"INGLESA",precio:22000,img:"inglesa.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"BROOKLYN",precio:21000,img:"brooklyn.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"YORK",precio:21000,img:"york.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"ALOHA",precio:23000,img:"aloha.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"MANCHESTER",precio:28000,img:"manchester.jpg",categoria:"HAMBURGUESAS"},
    {nombre:"BRUNCH MIX",precio:28000,img:"brunch_mix.jpg",categoria:"BRUNCH"},
    {nombre:"BRUNCH",precio:21000,img:"brunch.jpg",categoria:"BRUNCH"},
    {nombre:"BRUNCH DE POLLO",precio:21000,img:"brunch_pollo.jpg",categoria:"BRUNCH"},
    {nombre:"TACOS DON JULIO",precio:22000,img:"tacos.jpg",categoria:"COMIDA MEXICANA"},
    {nombre:"QUESADILLAS MONTERREY",precio:22000,img:"quesadillas.jpg",categoria:"COMIDA MEXICANA"},
    {nombre:"PAPAS COLOMBIANAS",precio:23000,img:"colombianas.jpg",categoria:"PAPAS"},
    {nombre:"ADICION DE TOCINETA",precio:2000,img:"tocineta.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN DE PAPAS",precio:4000,img:"papas.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN DE CARNE",precio:5000,img:"carne.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN SALSA",precio:1000,img:"salsa.jpg",categoria:"ADICIONES"},
    {nombre:"ADICIÓN QUESO",precio:1000,img:"queso.jpg",categoria:"ADICIONES"},
    {nombre:"MANGO BICHE",precio:7000,img:"mango.jpg",categoria:"SODA"},
    {nombre:"FRESA",precio:7000,img:"sfresa.jpg",categoria:"SODA"},
    {nombre:"MORA AZUL",precio:7000,img:"smora_azul.jpg",categoria:"SODA"},
    {nombre:"SANDÍA",precio:7000,img:"ssandia.jpg",categoria:"SODA"},
    {nombre:"MANDARINA",precio:7000,img:"smandarina.jpg",categoria:"SODA"},
    {nombre:"MANZANA VERDE",precio:7000,img:"smanzanaV.jpg",categoria:"SODA"},
    {nombre:"MICHELADA DE SODA",precio:7000,img:"misoda.jpg",categoria:"SODA"},
    {nombre:"MARACUYÁ",precio:7000,img:"smaracuya.jpg",categoria:"SODA"},
    {nombre:"TAMARINDO",precio:7000,img:"stamarindo.jpg",categoria:"SODA"},
    {nombre:"COCA COLA",precio:6000,img:"coca.jpg",categoria:"BEBIDAS"},
    {nombre:"CORONITA",precio:5000,img:"coronita.jpg",categoria:"BEBIDAS"},
    {nombre:"AGUA",precio:3000,img:"agua.jpg",categoria:"BEBIDAS"},
    {nombre:"TINTO",precio:1500,img:"tinto.jpg",categoria:"BEBIDAS"},
    {nombre:"AROMÁTICA",precio:1500,img:"aromatica.jpg",categoria:"BEBIDAS"},
    {nombre:"VINO",precio:6000,img:"vino.jpg",categoria:"BEBIDAS"}
];

let currentData = comidasAtico;
let carrito = [];
let ultimoEliminado = null;
let respaldoCarrito = null;
const ordenCategorias = ["HAMBURGUESAS","BRUNCH","COMIDA MEXICANA","PAPAS","ADICIONES","SODA","BEBIDAS"];

function setMode(mode) {
    modoPedido = mode;
    currentData = (mode === "ÁTICO") ? comidasAtico : comidasLlevar;
    document.getElementById("btnAtico").classList.toggle("active", mode === "ÁTICO");
    document.getElementById("btnLlevar").classList.toggle("active", mode === "PARA LLEVAR");
    renderMenu();
}

function renderMenu(){
    const menu = document.getElementById("menu");
    menu.innerHTML = "";
    ordenCategorias.forEach(cat => {
        const h = document.createElement("h2");
        h.className = "categoria";
        h.textContent = cat;
        menu.appendChild(h);
        const cont = document.createElement("div");
        cont.className = "container";
        currentData.filter(p => p.categoria === cat).forEach(p => {
            const card = document.createElement("div");
            card.className = "card";
            card.innerHTML = `<img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'"><div class="card-content"><h3>${p.nombre}</h3><div class="precio">$${p.precio.toLocaleString()}</div><button class="btn" onclick="agregar('${p.nombre}')">Añadir</button></div>`;
            cont.appendChild(card);
        });
        menu.appendChild(cont);
    });
}

function agregar(nombre) {
    const item = currentData.find(c => c.nombre === nombre);
    carrito.push(item);
    respaldoCarrito = null;
    const btn = document.getElementById('cartBtn');
    btn.classList.add('cart-anim');
    setTimeout(() => btn.classList.remove('cart-anim'), 300);
    renderCart();
}

function renderCart(){
    const items = document.getElementById("items");
    items.innerHTML = "";
    let total = 0;
    
    ordenCategorias.forEach(cat => {
        const prods = carrito.filter(p => p.categoria === cat);
        if(prods.length > 0) {
            if(cat === "SODA") items.innerHTML += `<div style="height:25px;"></div>`;
            items.innerHTML += `<div style="margin:18px 0 10px; font-size:22px; font-weight:bold; color:#f5d08a; border-bottom:1px solid rgba(255,255,255,.15); padding-bottom:6px;">${cat}</div>`;
            prods.forEach(p => {
                total += p.precio;
                items.innerHTML += `<div class="item"><img src="${p.img}" onerror="this.src='https://via.placeholder.com/150'"><div style="flex:1"><strong>${p.nombre}</strong><br>$${p.precio.toLocaleString()}</div><button onclick="eliminar(${carrito.indexOf(p)})">✖</button></div>`;
            });
        }
    });

    if(ultimoEliminado) items.innerHTML += `<div style="padding:15px; text-align:center;"><button onclick="revertirEliminacion()" style="background:#f5d08a; color:#000; border:none; padding:12px 20px; border-radius:12px; font-weight:bold;">↩ Revertir</button></div>`;
    if(respaldoCarrito && carrito.length === 0) items.innerHTML += `<div style="padding:15px; text-align:center;"><button onclick="deshacerVaciado()" style="background:#25D366; color:#fff; border:none; padding:12px 20px; border-radius:12px; font-weight:bold;">↩ Deshacer Vaciado</button></div>`;
    
    document.getElementById("count").textContent = carrito.length;
    document.getElementById("totalGeneral").textContent = total.toLocaleString();
}

function eliminar(i) {
    ultimoEliminado = {producto: carrito[i], posicion: i};
    carrito.splice(i, 1);
    renderCart();
}

function revertirEliminacion() {
    carrito.splice(ultimoEliminado.posicion, 0, ultimoEliminado.producto);
    ultimoEliminado = null;
    renderCart();
}

function vaciarCarrito() {
    respaldoCarrito = [...carrito];
    carrito = [];
    renderCart();
}

function deshacerVaciado() {
    carrito = [...respaldoCarrito];
    respaldoCarrito = null;
    renderCart();
}

function toggleCart() { document.getElementById("cart").classList.toggle("active"); }

function enviarPedido() {
    let msg = `PEDIDO ${modoPedido}\n\n`;
    let total = 0;
    
    ordenCategorias.forEach(cat => {
        const prods = carrito.filter(p => p.categoria === cat);
        if(cat === "SODA" && prods.length > 0) msg += "\n";
        
        prods.forEach(p => {
            msg += `• ${p.nombre} - $${p.precio.toLocaleString()}\n`;
            total += p.precio;
        });
    });
    
    msg += `\n TOTAL: $${total.toLocaleString()}`;
    window.open(`https://wa.me/${numeroWhatsApp}?text=${encodeURIComponent(msg)}`, "_blank");
}

renderMenu();
renderCart();
</script>

</body>
</html>
